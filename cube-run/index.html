<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cube Run</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #020510; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const W = 900, H = 500;
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width = W; canvas.height = H;

const TILE = 40;
const GRAV = 4000;   // GD-accurate: 2-block peak height
const JUMP_V = -800; // GD-accurate: sqrt(2 * 4000 * 80)
const SCROLL = 450;  // GD-accurate: ~11.2 blocks/sec * 40px/block
const GY = 440;   // ground y (top surface)
const PX = 140;   // player fixed screen x
const CS = 36;    // cube size
const LEVEL_TILES = 225;
const WIN_CAM = LEVEL_TILES * TILE - PX - 100; // camX at which player wins

// Level data: [tileX, type]
// S=spike, B=block, BS=block with spike on top
const levelRaw = [
  // Intro – easy singles
  [15,'S'],
  [19,'S'],
  [20,'S'],[21,'S'],
  [26,'B'],
  [30,'S'],
  [34,'S'],[35,'S'],
  [40,'B'],[41,'B'],
  [46,'S'],
  [50,'S'],[51,'S'],
  [56,'BS'],
  [61,'S'],
  [65,'S'],[66,'S'],
  // Medium
  [72,'B'],[73,'B'],
  [77,'S'],[78,'S'],
  [83,'BS'],
  [88,'S'],[89,'S'],[90,'S'],
  [95,'B'],
  [99,'S'],[100,'S'],
  [104,'BS'],[105,'S'],
  [110,'B'],[111,'B'],
  [116,'S'],[117,'S'],[118,'S'],
  [123,'BS'],
  [128,'S'],[129,'S'],
  [133,'B'],[134,'B'],[135,'B'],
  // Hard
  [140,'S'],[141,'S'],[142,'S'],
  [147,'BS'],
  [152,'S'],[153,'S'],
  [157,'BS'],[158,'BS'],
  [163,'S'],[164,'S'],[165,'S'],
  [170,'B'],[171,'B'],
  [175,'S'],[176,'S'],[177,'S'],
  [182,'BS'],
  [187,'S'],[188,'S'],
  // Climax
  [193,'B'],[194,'B'],[195,'B'],
  [200,'BS'],[201,'S'],
  [206,'S'],[207,'S'],[208,'S'],
  [213,'BS'],
  [217,'S'],[218,'S'],
];

// Check for a test level passed via URL hash from the editor
let testMode = false;
if (location.hash.length > 1) {
  try {
    const data = JSON.parse(atob(location.hash.slice(1)));
    levelRaw.length = 0;
    data.forEach(e => levelRaw.push(e));
    testMode = true;
  } catch(e) {}
}

function buildObs() {
  const list = [];
  for (const entry of levelRaw) {
    const tx = entry[0], type = entry[1], h = entry[2] ?? 0;
    const wx = tx * TILE;
    if (type === 'S') {
      list.push({ wx, wy: GY - TILE * (h + 1), type: 'S' });
    } else if (type === 'B') {
      list.push({ wx, wy: GY - TILE * (h + 1), type: 'B' });
    } else if (type === 'BS') {
      list.push({ wx, wy: GY - TILE * (h + 1), type: 'B' });
      list.push({ wx, wy: GY - TILE * (h + 2), type: 'S' });
    }
  }
  return list;
}
const obs = buildObs();

// Game state
let state = 'menu';
let attempts = 0;
let camX, py, vy, angle, onGround, deadTimer, pct, particles, trail, jumpBuffer;

function init() {
  camX = 0; py = GY - CS; vy = 0; angle = 0;
  onGround = true; deadTimer = 0; pct = 0;
  particles = []; trail = []; jumpBuffer = 0;
}
init();

function tryJump() {
  if (state === 'menu') {
    state = 'play'; attempts = 1; init();
  } else if (state === 'dead') {
    if (deadTimer > 0.65) { state = 'play'; attempts++; init(); }
  } else if (state === 'win') {
    state = 'menu';
  } else if (state === 'play') {
    if (onGround) { vy = JUMP_V; onGround = false; }
    else jumpBuffer = 0.1; // buffer: fire jump within 100ms of landing
  }
}

window.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); tryJump(); }
});
canvas.addEventListener('mousedown', tryJump);
canvas.addEventListener('touchstart', e => { e.preventDefault(); tryJump(); }, { passive: false });

function spawnExplosion(x, y) {
  for (let i = 0; i < 28; i++) {
    const a = Math.random() * Math.PI * 2;
    const spd = 60 + Math.random() * 320;
    particles.push({
      x, y,
      vx: Math.cos(a) * spd, vy: Math.sin(a) * spd - 90,
      life: 1, decay: 0.5 + Math.random() * 1.2,
      sz: 2 + Math.random() * 7,
      col: Math.random() < 0.5 ? '#00ffcc' : '#ffffff'
    });
  }
}

function die() {
  spawnExplosion(PX + CS / 2, py + CS / 2);
  state = 'dead'; deadTimer = 0;
}

function overlaps(ob, inset) {
  const pwL = camX + PX + inset;
  const pwR = camX + PX + CS - inset;
  const pwT = py + inset;
  const pwB = py + CS - inset;
  return pwR > ob.wx && pwL < ob.wx + TILE && pwB > ob.wy && pwT < ob.wy + TILE;
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.vy += 800 * dt;
    p.life -= p.decay * dt;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function update(dt) {
  updateParticles(dt);
  if (state === 'dead') { deadTimer += dt; return; }
  if (state !== 'play') return;

  camX += SCROLL * dt;
  pct = Math.min(camX / WIN_CAM, 1);
  if (camX >= WIN_CAM) { state = 'win'; return; }

  const prevPy = py; // save before physics update

  vy += GRAV * dt;
  py += vy * dt;

  // Ground
  if (py + CS >= GY) {
    py = GY - CS; vy = 0; onGround = true;
  } else {
    onGround = false;
  }

  // Block top landing — blocks are platforms, not killers
  const pwL = camX + PX + 3;
  const pwR = camX + PX + CS - 3;
  for (const ob of obs) {
    if (ob.type !== 'B') continue;
    if (pwR <= ob.wx || pwL >= ob.wx + TILE) continue; // no horizontal overlap
    // Player was above block top last frame and crosses it this frame going down
    if (prevPy + CS <= ob.wy + 2 && py + CS >= ob.wy && vy >= 0) {
      py = ob.wy - CS; vy = 0; onGround = true;
    }
  }

  // Jump buffer: if player pressed jump just before landing, fire it now
  if (jumpBuffer > 0) {
    jumpBuffer -= dt;
    if (onGround) { vy = JUMP_V; onGround = false; jumpBuffer = 0; }
  }

  // Rotation
  if (!onGround) angle += 350 * dt;
  else angle = Math.round(angle / 90) * 90;

  // Trail
  trail.push({ x: PX + CS / 2, y: py + CS / 2, a: 1 });
  for (const t of trail) t.a -= dt * 6;
  while (trail.length > 0 && trail[0].a <= 0) trail.shift();

  // Spike collision only — blocks no longer kill
  for (const ob of obs) {
    const sx = ob.wx - camX;
    if (sx > W + 10 || sx + TILE < -10) continue;
    if (ob.type === 'S' && overlaps(ob, 7)) { die(); return; }
  }
}

// Draw helpers
function drawBg() {
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#020510');
  g.addColorStop(0.8, '#061020');
  g.addColorStop(1, '#0a1828');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
}

function drawGrid() {
  ctx.save();
  ctx.strokeStyle = 'rgba(0,150,255,0.05)';
  ctx.lineWidth = 1;
  const sp = 50;
  const ox = -(camX * 0.25) % sp;
  for (let x = ox; x < W; x += sp) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += sp) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
  ctx.restore();
}

function drawGround() {
  ctx.fillStyle = '#070e20';
  ctx.fillRect(0, GY, W, H - GY);
  // Vertical grid lines on ground surface
  ctx.save();
  ctx.strokeStyle = 'rgba(0,200,120,0.12)';
  ctx.lineWidth = 1;
  const ox = -camX % TILE;
  for (let x = ox; x < W; x += TILE) {
    ctx.beginPath(); ctx.moveTo(x, GY); ctx.lineTo(x, H); ctx.stroke();
  }
  ctx.restore();
  // Glow line
  ctx.save();
  ctx.strokeStyle = '#00cc88';
  ctx.lineWidth = 2;
  ctx.shadowColor = '#00cc88';
  ctx.shadowBlur = 10;
  ctx.beginPath(); ctx.moveTo(0, GY); ctx.lineTo(W, GY); ctx.stroke();
  ctx.restore();
}

function drawObs() {
  for (const ob of obs) {
    const sx = ob.wx - camX;
    if (sx + TILE < -5 || sx > W + 5) continue;
    const sy = ob.wy;
    ctx.save();
    if (ob.type === 'B') {
      ctx.fillStyle = '#1155bb';
      ctx.shadowColor = '#3388ff';
      ctx.shadowBlur = 8;
      ctx.fillRect(sx, sy, TILE, TILE);
      ctx.strokeStyle = '#66aaff';
      ctx.lineWidth = 1.5;
      ctx.strokeRect(sx + 1, sy + 1, TILE - 2, TILE - 2);
      ctx.strokeStyle = 'rgba(100,180,255,0.35)';
      ctx.lineWidth = 1;
      ctx.shadowBlur = 0;
      ctx.beginPath();
      ctx.moveTo(sx + 4, sy + 4); ctx.lineTo(sx + TILE - 4, sy + TILE - 4);
      ctx.moveTo(sx + TILE - 4, sy + 4); ctx.lineTo(sx + 4, sy + TILE - 4);
      ctx.stroke();
    } else {
      ctx.fillStyle = '#ffdd00';
      ctx.shadowColor = '#ffaa00';
      ctx.shadowBlur = 10;
      ctx.beginPath();
      ctx.moveTo(sx + TILE / 2, sy);
      ctx.lineTo(sx + TILE, sy + TILE);
      ctx.lineTo(sx, sy + TILE);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.35)';
      ctx.lineWidth = 1;
      ctx.shadowBlur = 0;
      ctx.stroke();
    }
    ctx.restore();
  }
}

function drawPlayer() {
  if (state === 'dead') return;
  // Trail
  for (const t of trail) {
    if (t.a <= 0) continue;
    ctx.save();
    ctx.globalAlpha = t.a * 0.35;
    ctx.fillStyle = '#00ffcc';
    ctx.shadowColor = '#00ffcc';
    ctx.shadowBlur = 6;
    const s = CS * t.a * 0.75;
    ctx.fillRect(t.x - s / 2, t.y - s / 2, s, s);
    ctx.restore();
  }
  // Cube body
  ctx.save();
  ctx.translate(PX + CS / 2, py + CS / 2);
  ctx.rotate(angle * Math.PI / 180);
  ctx.fillStyle = '#00ffcc';
  ctx.shadowColor = '#00ffcc';
  ctx.shadowBlur = 18;
  ctx.fillRect(-CS / 2, -CS / 2, CS, CS);
  // Inner decoration
  ctx.strokeStyle = '#004433';
  ctx.lineWidth = 2;
  ctx.shadowBlur = 0;
  const m = 7;
  ctx.strokeRect(-CS / 2 + m, -CS / 2 + m, CS - 2 * m, CS - 2 * m);
  ctx.beginPath();
  ctx.moveTo(-CS / 2 + m, -CS / 2 + m); ctx.lineTo(CS / 2 - m, CS / 2 - m);
  ctx.moveTo(CS / 2 - m, -CS / 2 + m); ctx.lineTo(-CS / 2 + m, CS / 2 - m);
  ctx.stroke();
  ctx.restore();
}

function drawParticles() {
  for (const p of particles) {
    if (p.life <= 0) continue;
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.col;
    ctx.shadowColor = p.col;
    ctx.shadowBlur = 6;
    ctx.fillRect(p.x - p.sz / 2, p.y - p.sz / 2, p.sz, p.sz);
    ctx.restore();
  }
}

function drawHUD() {
  const bw = W - 80, bh = 8, bx = 40, by = 18;
  ctx.fillStyle = '#0d1830';
  ctx.fillRect(bx, by, bw, bh);
  ctx.fillStyle = '#00ffcc';
  ctx.shadowColor = '#00ffcc';
  ctx.shadowBlur = 5;
  ctx.fillRect(bx, by, bw * pct, bh);
  ctx.shadowBlur = 0;
  ctx.strokeStyle = '#1a2240';
  ctx.lineWidth = 1;
  ctx.strokeRect(bx, by, bw, bh);
  ctx.fillStyle = '#ccccee';
  ctx.font = '13px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(Math.floor(pct * 100) + '%', W / 2, by + 22);
  ctx.textAlign = 'right';
  ctx.fillStyle = '#556677';
  ctx.font = '12px monospace';
  ctx.fillText('attempt ' + attempts, W - 15, H - 12);
  if (testMode) {
    ctx.textAlign = 'left';
    ctx.fillStyle = '#ffaa00';
    ctx.font = 'bold 11px monospace';
    ctx.fillText('TEST MODE', 15, H - 12);
  }
}

function drawOverlay() {
  if (state === 'menu') {
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center';
    ctx.fillStyle = '#00ffcc';
    ctx.shadowColor = '#00ffcc';
    ctx.shadowBlur = 25;
    ctx.font = 'bold 58px monospace';
    ctx.fillText('CUBE RUN', W / 2, H / 2 - 35);
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#aabbcc';
    ctx.font = '20px monospace';
    ctx.fillText('SPACE or CLICK to start', W / 2, H / 2 + 20);
    ctx.fillStyle = '#445566';
    ctx.font = '14px monospace';
    ctx.fillText('tap to jump  ·  timing is everything', W / 2, H / 2 + 52);
  } else if (state === 'dead') {
    ctx.fillStyle = 'rgba(0,0,0,0.52)';
    ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ff3355';
    ctx.shadowColor = '#ff3355';
    ctx.shadowBlur = 20;
    ctx.font = 'bold 52px monospace';
    ctx.fillText('DEAD', W / 2, H / 2 - 30);
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#ccccdd';
    ctx.font = '18px monospace';
    ctx.fillText(Math.floor(pct * 100) + '% reached  ·  attempt ' + attempts, W / 2, H / 2 + 15);
    if (deadTimer > 0.65) {
      ctx.fillStyle = '#ffffff';
      ctx.font = '16px monospace';
      ctx.fillText('SPACE or CLICK to retry', W / 2, H / 2 + 50);
    }
  } else if (state === 'win') {
    ctx.fillStyle = 'rgba(0,5,20,0.65)';
    ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center';
    ctx.fillStyle = '#00ffcc';
    ctx.shadowColor = '#00ffcc';
    ctx.shadowBlur = 30;
    ctx.font = 'bold 50px monospace';
    ctx.fillText('LEVEL COMPLETE', W / 2, H / 2 - 45);
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#ffee44';
    ctx.font = '24px monospace';
    ctx.fillText('100%  *', W / 2, H / 2 + 5);
    ctx.fillStyle = '#aabbcc';
    ctx.font = '16px monospace';
    ctx.fillText('completed in ' + attempts + (attempts === 1 ? ' attempt' : ' attempts'), W / 2, H / 2 + 45);
    ctx.fillStyle = '#445566';
    ctx.font = '13px monospace';
    ctx.fillText('SPACE or CLICK to return to menu', W / 2, H / 2 + 78);
    ctx.fillStyle = '#2a3a4a';
    ctx.font = '11px monospace';
    ctx.fillText('level editor → editor.html', W / 2, H / 2 + 100);
  }
}

function draw() {
  drawBg();
  drawGrid();
  drawGround();
  drawObs();
  drawPlayer();
  drawParticles();
  if (state === 'play' || state === 'dead') drawHUD();
  drawOverlay();
}

let last = 0;
function loop(ts) {
  update(Math.min((ts - last) / 1000, 0.05));
  last = ts;
  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(ts => { last = ts; requestAnimationFrame(loop); });
</script>
</body>
</html>
